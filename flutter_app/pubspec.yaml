name: rozgarx
description: "RozgarX - AI-Powered Government Job Alert App"
publish_to: none
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.8.5
  firebase_analytics: ^10.10.5
  firebase_crashlytics: ^3.4.16

  # State
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  badges: ^3.1.2
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0+3

  # Navigation
  go_router: ^13.2.1

  # Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Utils
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  intl: ^0.18.1
  uuid: ^4.4.0
  collection: ^1.18.0
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1
  in_app_review: ^2.0.9

  # Ads
  google_mobile_ads: ^5.1.0

  # Auth
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/
